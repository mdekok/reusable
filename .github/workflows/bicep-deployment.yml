name: Deploy Bicep file

on:
  workflow_call:
    inputs:
      action:
        description: 'Deployment action: validate, what-if or create'
        required: true
        type: string
      filepath:
        required: true
        type: string
      environment:
        required: true
        type: string
      version:
        required: true
        type: string
        default: 'latest'
        
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - name: Check out
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Login Azure
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Set exclude-change-types argument to reduce noise in output of what-if
      run: |
        if [ ${{ inputs.action }} = "what-if" ]; then
          echo "EXCLUDE=--exclude-change-types Ignore NoChange Unsupported" >> $GITHUB_ENV
        else
          echo "EXCLUDE=" >> $GITHUB_ENV
        fi

    - name: Deployment
      uses: azure/CLI@v3
      with:
        azcliversion: latest
        inlineScript: |
          COMMON_ARGS="--template-file $FILEPATH --resource-group $RESOURCE_GROUP --parameters env=${{ vars.LABEL }} version=${{ inputs.version }} location=${{ vars.LOCATION }}"

          if [ "${ACTION}" = "what-if" ]; then
            az deployment group what-if $COMMON_ARGS > what-if.txt
          else
            az deployment group ${{ inputs.action }} $COMMON_ARGS
          fi
#          az deployment group ${{ inputs.action }} \
#            --template-file ${{ inputs.filepath }} \
#            --resource-group ${{ vars.RESOURCE_GROUP }} \
#            --parameters env=${{ vars.LABEL }} version=${{ inputs.version }} location=${{ vars.LOCATION }} \
#            $EXCLUDE \
#            > what-if.txt

    - name: Upload what-if results as artifact
      if: inputs.action == 'what-if'
      uses: actions/upload-artifact@v7
      with:
        name: what-if
        path: what-if.txt
    
